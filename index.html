<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artha HE · Health Economics Workbench</title>
<link rel="stylesheet" media="print" onload="this.media='all'"
  href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"></noscript>
<style>
/* ============================ TOKENS ============================ */
:root{
  --bg:#F3F2F8; --bg-warm:#EBE9F3; --surface:#FFFFFF; --surface-2:#FAF9FD;
  --ink:#1A1733; --ink-2:#2A2550; --ink-soft:#3A3463;
  --muted:#6E6A86; --muted-light:#9B97B4;
  --primary:#5B4BD6; --primary-bright:#7261F0; --primary-soft:#ECE9FB;
  --gold:#C8971F; --gold-bright:#E0AC3F; --gold-soft:#F7EFD8;
  --emerald:#0E9E78; --emerald-soft:#E0F3EC;
  --amber:#DD9430; --red:#DC4B4B; --red-soft:#FBE9E9;
  --line:#E5E3F0; --line-soft:#EFEEF6;
  --display:'Fraunces',Georgia,serif; --sans:'Plus Jakarta Sans',-apple-system,sans-serif; --mono:'IBM Plex Mono','SF Mono',monospace;
  --shadow-sm:0 1px 2px rgba(26,23,51,.05); --shadow:0 1px 2px rgba(26,23,51,.04),0 6px 20px rgba(26,23,51,.05);
  --shadow-lg:0 12px 40px rgba(26,23,51,.12); --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.5;font-size:13.5px;-webkit-font-smoothing:antialiased;}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important;}}
::selection{background:var(--primary-soft);}

/* ============================ SHELL ============================ */
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh;}
header.topbar{background:linear-gradient(110deg,#1A1733 0%,#241F46 60%,#2A2550 100%);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:relative;}
header.topbar::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold-bright) 30%,transparent 70%);}
.brand{display:flex;align-items:center;gap:12px;padding:13px 0;cursor:pointer;}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--gold-bright),var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;color:#241F46;font-size:19px;box-shadow:0 2px 8px rgba(200,151,31,.35);animation:floaty 5s ease-in-out infinite;}
.brand .name{font-family:var(--display);font-weight:600;font-size:20px;}
.brand .name b{color:var(--gold-bright);font-weight:600;}
.brand .tagline{font-size:11px;color:var(--muted-light);margin-top:1px;}
.topnav{display:flex;gap:2px;background:rgba(255,255,255,.06);padding:4px;border-radius:11px;flex-wrap:wrap;}
.topnav button{font-family:var(--sans);font-weight:600;font-size:12px;color:#B9B5D4;background:transparent;border:none;padding:7px 13px;border-radius:8px;cursor:pointer;transition:all .16s ease;}
.topnav button:hover{color:#fff;background:rgba(255,255,255,.05);}
.topnav button.active{background:var(--primary);color:#fff;box-shadow:0 2px 10px rgba(91,75,214,.4);}
.topnav button.home{color:var(--gold-bright);}
.brand-meta{font-family:var(--mono);font-size:10px;color:var(--muted-light);text-align:right;line-height:1.5;}

.layout{display:grid;grid-template-columns:374px 1fr;min-height:0;}
.layout.full{grid-template-columns:1fr;}
.layout.full .panel-input{display:none;}
@media (max-width:980px){.layout{grid-template-columns:1fr;}}

/* ============================ SIDEBAR ============================ */
.panel-input{background:var(--surface);border-right:1px solid var(--line);padding:24px 22px;overflow-y:auto;max-height:calc(100vh - 62px);}
.panel-input h2{font-family:var(--display);font-size:16px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:10px;}
.section-num{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--primary);background:var(--primary-soft);padding:3px 8px;border-radius:6px;}
.hint{font-size:11.5px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.seg{display:flex;gap:3px;margin-bottom:16px;background:var(--bg-warm);border-radius:10px;padding:4px;flex-wrap:wrap;}
.seg button{flex:1;padding:7px 8px;border:none;background:transparent;font-family:var(--sans);font-size:11.5px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:7px;transition:all .15s ease;min-width:44px;}
.seg button.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);}
.seg.types button.active{background:var(--primary);color:#fff;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
.field .lab-val{float:right;font-family:var(--mono);color:var(--primary);font-weight:600;text-transform:none;letter-spacing:0;}
.field.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field.two>div label{display:block;font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
select,input[type=text],input[type=number]{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font-family:var(--sans);font-size:13px;background:var(--surface);color:var(--ink);transition:border-color .15s,box-shadow .15s;}
select:focus,input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);}
input[type=range]{width:100%;accent-color:var(--primary);height:5px;}
.divider{height:1px;background:var(--line);margin:20px 0;}
.sublabel{font-size:10.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 9px;}

.grid-wrap{border:1.5px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:12px;}
table.data-grid{width:100%;border-collapse:collapse;font-size:11.5px;}
table.data-grid th{background:var(--surface-2);font-family:var(--mono);font-weight:600;text-align:left;padding:8px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;border-bottom:1.5px solid var(--line);white-space:nowrap;}
table.data-grid td{padding:0;border-bottom:1px solid var(--line-soft);}
table.data-grid input,table.data-grid select{border:none;border-radius:0;padding:7px 8px;font-size:11.5px;font-family:var(--mono);background:transparent;}
table.data-grid select{font-family:var(--sans);font-size:10.5px;}
table.data-grid input:focus{background:var(--primary-soft);box-shadow:none;}
table.data-grid tr:last-child td{border-bottom:none;}
.row-del{width:24px;text-align:center;cursor:pointer;color:var(--muted-light);font-size:14px;}
.row-del:hover{color:var(--red);}

.btn-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.btn{font-family:var(--sans);font-weight:600;font-size:12px;padding:9px 14px;border-radius:9px;border:1.5px solid transparent;cursor:pointer;transition:all .16s ease;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 10px rgba(91,75,214,.28);}
.btn-primary:hover{background:var(--primary-bright);transform:translateY(-1px);}
.btn-secondary{background:var(--surface);color:var(--ink);border-color:var(--line);}
.btn-secondary:hover{border-color:var(--muted-light);}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--line);}
.btn-ghost:hover{background:var(--bg-warm);}
.btn-block{width:100%;justify-content:center;}
.btn.sm{padding:6px 10px;font-size:11px;border-radius:7px;}
.csv-drop{border:2px dashed var(--line);border-radius:11px;padding:14px;text-align:center;font-size:11.5px;color:var(--muted);cursor:pointer;margin-bottom:12px;transition:all .15s;}
.csv-drop:hover{border-color:var(--primary);background:var(--primary-soft);}
.csv-drop input[type=file]{display:none;}

/* checklist (advisor) */
.checklist{list-style:none;margin:6px 0 0;}
.checklist li{display:flex;gap:9px;align-items:flex-start;font-size:12px;padding:6px 0;color:var(--ink-soft);line-height:1.4;}
.checklist .ok{color:var(--emerald);font-weight:700;}
.checklist .no{color:var(--red);font-weight:700;}
.advisor{background:var(--primary-soft);border-radius:11px;padding:13px 14px;margin-bottom:14px;}
.advisor .rec{font-size:13px;font-weight:700;color:var(--primary);margin:4px 0 2px;font-family:var(--display);}

/* ============================ WORKSPACE ============================ */
.panel-workspace{background:var(--bg);overflow-y:auto;max-height:calc(100vh - 62px);padding:26px 30px;}
.ws-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.ws-head h2{font-family:var(--display);font-size:23px;font-weight:600;color:var(--ink);letter-spacing:-.01em;}
.ws-head .sub{font-size:12.5px;color:var(--muted);margin-top:4px;max-width:620px;line-height:1.55;}
.exp-bar{display:flex;gap:6px;flex-wrap:wrap;}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:13px;margin-bottom:22px;}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--line);}
.kpi.accent::before{background:var(--primary);} .kpi.gold::before{background:var(--gold);} .kpi.emerald::before{background:var(--emerald);}
.kpi .k-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}
.kpi .k-val{font-family:var(--display);font-size:21px;font-weight:600;color:var(--ink);line-height:1.05;}
.kpi .k-val.mono{font-family:var(--mono);font-size:18px;font-weight:600;}
.kpi .k-val.sm{font-size:15.5px;}
.kpi .k-sub{font-size:11px;color:var(--muted-light);margin-top:5px;font-family:var(--mono);}

.result-tabs{display:flex;gap:6px;border-bottom:1.5px solid var(--line);margin-bottom:20px;overflow-x:auto;}
.result-tab{padding:10px 15px;font-family:var(--sans);font-weight:600;font-size:12.5px;color:var(--muted);background:transparent;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.result-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.result-tab:hover:not(.active){color:var(--ink);}
.pane{display:none;} .pane.active{display:block;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px;box-shadow:var(--shadow);}
.card h3{font-family:var(--display);font-size:15.5px;font-weight:600;margin-bottom:4px;}
.card .card-sub{font-size:11.5px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.card.flush{padding:0;overflow:hidden;} .card.flush .pad{padding:20px;}

.table-scroll{overflow-x:auto;}
table.results-table{width:100%;border-collapse:collapse;font-size:12.5px;}
table.results-table th{background:var(--surface-2);font-family:var(--mono);font-weight:600;text-align:right;padding:9px 12px;font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;border-bottom:1.5px solid var(--line);}
table.results-table th:first-child,table.results-table td:first-child{text-align:left;}
table.results-table td{padding:9px 12px;text-align:right;font-family:var(--mono);font-size:12px;border-bottom:1px solid var(--line-soft);}
table.results-table tr:last-child td{border-bottom:none;}
table.results-table td:first-child{font-family:var(--sans);font-weight:500;}
table.results-table tfoot td{font-weight:700;border-top:1.5px solid var(--line);background:var(--surface-2);}
.tag{display:inline-block;font-family:var(--sans);font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;}
.tag.frontier{background:var(--emerald-soft);color:var(--emerald);} .tag.dominated{background:var(--red-soft);color:var(--red);} .tag.ext{background:var(--gold-soft);color:#9A7415;}

svg.chart{width:100%;height:auto;display:block;font-family:var(--sans);}
.legend{display:flex;gap:16px;flex-wrap:wrap;padding:12px 20px;background:var(--surface-2);border-top:1px solid var(--line);font-size:11px;color:var(--muted);}
.legend .item{display:flex;align-items:center;gap:7px;} .legend .sw{width:13px;height:13px;border-radius:4px;}
.note{font-size:11px;color:var(--muted-light);margin-top:12px;line-height:1.5;font-style:italic;}
.callout{background:var(--primary-soft);border-radius:11px;padding:12px 14px;font-size:12px;color:var(--ink-soft);line-height:1.5;margin-bottom:16px;}
.callout b{color:var(--primary);}

/* ============================ LANDING / HOME ============================ */
#landing{min-height:100vh;}
.lhead{position:sticky;top:0;z-index:30;background:rgba(243,242,248,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:11px 26px;flex-wrap:wrap;gap:10px;}
.lhead .brand{padding:0;cursor:default;}
.lhead .brand .name{color:var(--ink);}
.lhead .brand .tagline{color:var(--muted);}
.home{max-width:1080px;margin:0 auto;padding:18px 18px 40px;}
.hero{position:relative;overflow:hidden;border-radius:24px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-lg);padding:54px 44px;margin-bottom:34px;}
.fluid{position:absolute;inset:0;z-index:0;filter:blur(64px);opacity:.5;pointer-events:none;}
.fluid span{position:absolute;border-radius:50%;mix-blend-mode:multiply;animation:floatblob 19s ease-in-out infinite;}
.fluid .b1{background:var(--primary-bright);width:360px;height:360px;top:-90px;left:-50px;}
.fluid .b2{background:var(--gold-bright);width:320px;height:320px;bottom:-110px;right:8%;animation-delay:-7s;}
.fluid .b3{background:var(--emerald);width:280px;height:280px;top:24%;right:-70px;animation-delay:-13s;}
@keyframes floatblob{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(46px,-34px) scale(1.12);}66%{transform:translate(-34px,24px) scale(.94);}}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes spin{to{transform:rotate(360deg);}}
.hero-inner{position:relative;z-index:1;display:flex;gap:34px;align-items:center;flex-wrap:wrap;}
.logo-hero{position:relative;width:118px;height:118px;flex-shrink:0;}
.logo-hero .ring{position:absolute;inset:-9px;border-radius:32px;background:conic-gradient(from 0deg,var(--gold),var(--primary),var(--emerald),var(--gold-bright),var(--gold));animation:spin 9s linear infinite;filter:blur(3px);opacity:.75;}
.logo-hero .tile{position:absolute;inset:0;border-radius:28px;background:linear-gradient(150deg,#241F46,#2A2550);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:60px;color:var(--gold-bright);box-shadow:var(--shadow-lg);animation:floaty 5s ease-in-out infinite;}
.hero h1{font-family:var(--display);font-size:42px;font-weight:600;letter-spacing:-.015em;line-height:1.05;}
.hero h1 b{color:var(--gold);font-weight:600;}
.hero .lead{font-size:15px;color:var(--ink-soft);margin:12px 0 8px;max-width:560px;line-height:1.6;}
.hero .pills{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 22px;}
.pill{font-size:11px;font-weight:600;color:var(--primary);background:var(--primary-soft);padding:5px 12px;border-radius:20px;}
.hero .cta{display:flex;gap:12px;flex-wrap:wrap;}
.btn-lg{padding:13px 24px;font-size:14px;border-radius:11px;}

.home h2.sec{font-family:var(--display);font-size:24px;font-weight:600;margin:34px 0 6px;}
.home p.secsub{font-size:13px;color:var(--muted);margin-bottom:20px;max-width:680px;line-height:1.6;}
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;}
.step{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.step .n{width:30px;height:30px;border-radius:9px;background:var(--ink);color:#fff;font-family:var(--mono);font-weight:600;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:13px;}
.step h4{font-size:14px;font-weight:700;margin-bottom:5px;}
.step p{font-size:12px;color:var(--muted);line-height:1.5;}
.defs{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;}
.def{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 19px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;}
.def:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary);}
.def .abbr{font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;background:var(--primary);padding:3px 9px;border-radius:6px;display:inline-block;margin-bottom:9px;}
.def .abbr.gold{background:var(--gold);} .def .abbr.em{background:var(--emerald);} .def .abbr.ink{background:var(--ink);}
.def h4{font-size:13.5px;font-weight:700;margin-bottom:6px;}
.def p{font-size:11.8px;color:var(--muted);line-height:1.55;}
.def .go{font-size:11px;font-weight:600;color:var(--primary);margin-top:10px;display:inline-block;}
.method{background:linear-gradient(120deg,#1A1733,#2A2550);color:#E9E7F5;border-radius:20px;padding:30px 32px;margin-top:34px;box-shadow:var(--shadow-lg);}
.method h3{font-family:var(--display);font-size:20px;color:#fff;margin-bottom:8px;}
.method p{font-size:12.8px;line-height:1.65;color:#C7C3E0;max-width:760px;}
.method .badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.method .badge{font-size:11px;font-weight:600;color:var(--gold-bright);background:rgba(224,172,63,.12);padding:6px 13px;border-radius:20px;border:1px solid rgba(224,172,63,.25);}
footer.foot{font-size:11px;color:var(--muted-light);text-align:center;padding:26px;font-family:var(--mono);}

/* ---- topbar tools, tooltips, methods page ---- */
.topbar-tools{display:flex;gap:7px;align-items:center;}
.tbtn{font-family:var(--sans);font-size:11.5px;font-weight:600;color:#CFCBE8;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);padding:6px 11px;border-radius:8px;cursor:pointer;transition:all .15s;}
.tbtn:hover{background:rgba(255,255,255,.15);color:#fff;}
.tbtn.rep{background:var(--gold);color:#241F46;border-color:var(--gold-bright);}
.tbtn.rep:hover{background:var(--gold-bright);color:#241F46;}
abbr.gl{border-bottom:1.5px dotted var(--primary);cursor:help;text-decoration:none;}
.eqgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:15px;margin-bottom:8px;}
.eq{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.eq h4{font-size:13.5px;font-weight:700;margin-bottom:9px;}
.eq .formula{font-family:var(--mono);font-size:12.5px;background:var(--ink);color:#E9E7F5;padding:11px 13px;border-radius:9px;margin-bottom:9px;overflow-x:auto;white-space:nowrap;}
.eq p{font-size:11.5px;color:var(--muted);line-height:1.5;}
.valid-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line-soft);font-size:12.5px;}
.valid-row:last-child{border:none;}
.valid-row .vp{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);}
.valid-row .vok{color:var(--emerald);font-weight:700;font-size:15px;}
.valid-row .vno{color:var(--red);font-weight:700;font-size:15px;}
.glossary dl{display:grid;grid-template-columns:auto 1fr;gap:9px 18px;font-size:12.5px;margin-top:4px;}
.glossary dt{font-weight:700;color:var(--primary);font-family:var(--mono);font-size:12px;}
.glossary dd{color:var(--ink-soft);line-height:1.5;}
</style>
</head>
<body>
<div id="landing"></div>
<div class="app" id="appShell" style="display:none">
  <header class="topbar">
    <div class="brand" id="brandHome" title="Back to the intro page">
      <div class="logo">अ</div>
      <div><div class="name">Artha<b> HE</b></div><div class="tagline">Health Economics Workbench</div></div>
    </div>
    <nav class="topnav" id="topnav">
      <button data-mod="costing" class="active">Costing</button>
      <button data-mod="oop">Out-of-Pocket</button>
      <button data-mod="evaluation">Evaluation</button>
      <button data-mod="modeling">Modeling</button>
      <button data-mod="sensitivity">Sensitivity</button>
      <button data-mod="bia">Budget Impact</button>
      <button data-mod="methods">Methods</button>
    </nav>
    <div class="topbar-tools">
